<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF7A5C"/>
      <stop offset="100%" stop-color="#FF4E8B"/>
    </linearGradient>
    <radialGradient id="helm" cx="36%" cy="32%" r="60%">
      <stop offset="0%" stop-color="#FFF5E6"/>
      <stop offset="100%" stop-color="#FFDCB4"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Helmet glow ring -->
  <circle cx="30" cy="32" r="22" fill="rgba(91,192,235,0.18)" stroke="rgba(255,255,255,0.55)" stroke-width="1.5"/>
  <!-- Helmet face -->
  <circle cx="30" cy="32" r="18" fill="url(#helm)"/>
  <!-- Helmet shine -->
  <ellipse cx="37" cy="23" rx="7" ry="4" fill="white" opacity=".22" transform="rotate(-20,37,23)"/>

  <!-- Eyes -->
  <circle cx="22" cy="30" r="4" fill="#1A0A3D"/>
  <circle cx="38" cy="30" r="4" fill="#1A0A3D"/>
  <!-- Pupils -->
  <circle cx="23.5" cy="28.5" r="1.5" fill="white"/>
  <circle cx="39.5" cy="28.5" r="1.5" fill="white"/>
  <!-- Shine -->
  <circle cx="23" cy="28" r="0.7" fill="#5BC0EB"/>
  <circle cx="39" cy="28" r="0.7" fill="#5BC0EB"/>

  <!-- Cheeks -->
  <ellipse cx="16" cy="36" rx="4.5" ry="3" fill="#FFB3C6" opacity=".6"/>
  <ellipse cx="44" cy="36" rx="4.5" ry="3" fill="#FFB3C6" opacity=".6"/>

  <!-- Smile -->
  <path d="M20 38 Q30 47 40 38" stroke="#1A0A3D" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Antenna -->
  <line x1="30" y1="14" x2="30" y2="7" stroke="#6B3FA0" stroke-width="2" stroke-linecap="round"/>
  <!-- Star -->
  <polygon points="30,1 31.2,5 35.2,5 32,7.5 33.2,11.5 30,9 26.8,11.5 28,7.5 24.8,5 28.8,5" fill="#FFE082"/>

  <!-- Page badge: MENTOR — star (purple circle, bottom-right) -->
  <circle cx="51" cy="51" r="11" fill="#6A1B9A" stroke="white" stroke-width="1.8"/>
  <!-- 5-point star -->
  <polygon points="51,42 52.8,47.4 58.5,47.4 53.9,50.7 55.6,56.1 51,52.8 46.4,56.1 48.1,50.7 43.5,47.4 49.2,47.4" fill="#FFE082"/>
</svg>
